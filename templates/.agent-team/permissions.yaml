git:
  protected_branches:
    - "{{PROTECTED_BRANCH}}"
  allow_commit: false
  allow_push: false
  allow_merge: false
  allow_force_push: false

filesystem:
  allowed_paths:
    - "**"
  forbidden_paths:
    - "**/.env"
    - "**/.env.*"
    - "**/secrets/**"
    - "**/signing/**"
    - "**/*.keystore"
    - "**/*.jks"
    - "**/*.p12"
    - "**/*.pem"
    - "**/local.properties"

operations:
  allow_dependency_install: false
  allow_network_access: false
  allow_release: false
  allow_deploy: false
  allow_publish: false
  allow_secret_access: false

notes:
  - Project initialization must replace broad allowed paths with verified project-specific boundaries where practical.
  - A task contract may narrow permissions but must not weaken these repository-level safeguards without explicit human approval.
