schema_version: 1

git:
  protected_branches:
    - "{{PROTECTED_BRANCH}}"
  allow_commit: false
  allow_push: false
  allow_merge: false
  allow_force_push: false

filesystem:
  allowed_paths:
    - "**"
  forbidden_paths:
    - "**/.env"
    - "**/.env.*"
    - "**/secrets/**"
    - "**/signing/**"
    - "**/*.keystore"
    - "**/*.jks"
    - "**/*.p12"
    - "**/*.pem"
    - "**/local.properties"

operations:
  allow_dependency_install: false
  allow_network_access: false
  allow_release: false
  allow_deploy: false
  allow_publish: false
  allow_secret_access: false

conditional_policy:
  restrictions_are_defaults: true
  may_be_overridden_by_human: true
  override_configuration: .agent-team/overrides.yaml
  override_log: .agent-team/overrides/session-overrides.jsonl
  require_confirmation_before_execution: true
  default_override_expiration: session_end
  persistent_change_requires_separate_approval: true

notes:
  - Project initialization must replace broad allowed paths with verified project-specific boundaries where practical.
  - A task contract may narrow permissions freely.
  - Weakening a repository-level restriction requires an explicit scoped human override before execution.
  - An override cannot create unavailable credentials, permissions, quota, subscription, tooling, or platform capability.