default_worker: codex-self

workers:
  codex-self:
    use_when:
      - low-risk configuration or documentation change
      - narrow bug fix with verified context
      - focused test addition
      - task where delegation overhead exceeds implementation cost
      - any browser, application, emulator, simulator, device, ADB, CLI, API, database, or runtime interaction
      - collection of screenshots, screen recordings, layout snapshots, hierarchy dumps, logs, or runtime evidence
      - Claude Code is unavailable, interrupted, usage-limited, or produced no usable result
    responsibilities:
      - interactive product operation and testing
      - bug reproduction in real execution environments
      - runtime evidence collection
      - regression validation
      - final acceptance-criteria verification
    constraints:
      require_task_contract: true
      require_final_review: true

  claude-code:
    use_when:
      - implementation benefits from a dedicated worker
      - UI, UX, interaction design, visual hierarchy, component composition, accessibility presentation, or design-system fidelity is central
      - UI or component work has explicit boundaries
      - multi-step implementation remains narrow enough for scoped execution
      - Codex determines independent implementation and review improves quality
    may_receive:
      - screenshots
      - screen recordings
      - layout snapshots
      - hierarchy dumps
      - design specifications
      - design tokens
      - observed runtime evidence
    must_not:
      - launch or install the product
      - navigate or click through the product
      - operate browsers, applications, emulators, simulators, or devices
      - perform ADB-driven or other interactive runtime testing
    constraints:
      require_task_contract: true
      require_explicit_allowed_paths: true
      require_explicit_forbidden_paths: true
      require_validation_commands: true
      max_attempts: 3

fallback:
  on_worker_interruption: codex-self
  continue_task_without_human_prompt: true
  preserve_partial_diff: true
  review_partial_worker_changes_before_continuing: true
  create_interruption_checkpoint: true
  interruption_checkpoint_directory: .agent-team/reviews
  interruption_classifications:
    - usage_limit
    - authentication
    - tool_refusal
    - timeout
    - nonzero_exit
    - invalid_or_empty_result
    - validation_failure
    - unknown
  final_report_required: true
  final_report_fields:
    - worker_and_model_used
    - interruption_classification
    - phase_where_worker_stopped
    - work_completed_before_interruption
    - work_completed_by_codex_after_fallback
    - work_that_lost_independent_worker_input
    - compensating_review_and_testing
    - residual_quality_risk

routing_rules:
  - never delegate merely to create activity
  - choose the least expensive capable worker
  - prefer codex-self for trivial changes and all interactive testing
  - prefer claude-code for bounded UI/UX/design-specialist work when the task contract is complete
  - Codex gathers runtime evidence and may send it to Claude for design comparison
  - Claude never operates or interactively tests the product
  - use expensive frontier models only when their expected quality advantage justifies observed usage
  - treat historical usage multipliers as project observations, not universal facts
  - when Claude becomes unavailable, Codex continues the task to completion rather than stopping
  - escalate architectural ambiguity to the human
  - do not use a worker whose required context cannot be bounded safely
